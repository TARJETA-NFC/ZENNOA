<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZENNOA - Juegos Online</title>
    <style>
        :root {
            --primary-color: #6366f1;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            background-color: var(--card-bg);
            width: 100%;
            padding: 2rem 0;
            text-align: center;
            border-bottom: 2px solid var(--primary-color);
        }
        main {
            padding: 2rem;
            max-width: 900px;
            width: 90%;
        }
        .game-container {
            background-color: var(--card-bg);
            padding: 1rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .embed-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* Aspecto 16:9 */
            height: 0;
        }
        .embed-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 8px;
        }
        footer {
            text-align: center;
            padding: 2rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <header>
        <h1>ZENNOA GAMES</h1>
        <p>Tu plataforma de juegos favoritos</p>
    </header>

    <main>
        <section class="game-container">
            <h2>Meme Myth: Wukong</h2>
            <div class="embed-wrapper">
                <iframe 
                    src="https://html5.gamedistribution.com/e4af90c070cf499da371b44232a6aaca/?gd_sdk_referrer_url=https://tarjeta-nfc.github.io/ZENNOA/" 
                    scrolling="none" 
                    frameborder="0" 
                    allowfullscreen>
                </iframe>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 ZENNOA - Todos los derechos reservados</p>
    </footer>
</body>
</html>
