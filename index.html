<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZENNOA - Juegos Internos</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; margin: 0; text-align: center; }
        .game-box { margin: 20px auto; max-width: 800px; }
        /* Esto obliga al juego a ser responsivo */
        .iframe-container { position: relative; width: 100%; padding-bottom: 60%; background: #000; }
        iframe { position: absolute; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <h1>ZENNOA Arcade</h1>

    <div class="game-box">
        <!-- El atributo sandbox permite ejecutar el juego sin que pueda abrir popups -->
        <div class="iframe-container">
            <iframe 
                src="https://html5.gamedistribution.com/e4af90c070cf499da371b44232a6aaca/?gd_sdk_referrer_url=https://tarjeta-nfc.github.io/ZENNOA/" 
                sandbox="allow-scripts allow-same-origin allow-forms"
                allow="autoplay; fullscreen"
                scrolling="no">
            </iframe>
        </div>
    </div>

</body>
</html>
