<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Adriana Páez | Engineering</title>
    <style>
        :root {
            --bg: #0A0A0A;
            --gold: #D4AF37;
            --glass: rgba(255, 255, 255, 0.05);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'SF Pro Display', -apple-system, sans-serif; }
        body { background: var(--bg); color: white; display: flex; justify-content: center; overflow-x: hidden; }
        
        .app-container { width: 100%; max-width: 430px; min-height: 100vh; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        /* Hero */
        .hero { margin-top: 60px; text-align: center; }
        .avatar { width: 140px; height: 140px; border-radius: 30px; background: linear-gradient(45deg, #1a1a1a, #000); border: 1px solid var(--gold); margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { font-size: 32px; color: var(--gold); letter-spacing: -1px; }
        p { font-size: 16px; opacity: 0.7; margin-top: 5px; }

        /* Glass Buttons */
        .btn-group { width: 100%; margin-top: 40px; display: flex; flex-direction: column; gap: 15px; }
        .btn { 
            width: 100%; padding: 18px; background: var(--glass); backdrop-filter: blur(15px);
            border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 20px;
            color: white; text-align: center; text-decoration: none; font-weight: 600;
            transition: all 0.3s ease; position: relative; overflow: hidden;
        }
        .btn:active { transform: scale(0.97); }
        .btn-gold { border-color: var(--gold); color: var(--gold); }
        .btn-gold:hover { background: var(--gold); color: var(--bg); }

        /* Section Cards */
        .card-section { width: 100%; margin-top: 30px; padding: 20px; background: var(--glass); border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .grid-social { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; }
        .icon { height: 50px; background: rgba(255,255,255,0.03); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="hero">
        <div class="avatar"></div>
        <h1>Adriana Páez</h1>
        <p>Ingeniería Industrial & Eficiencia</p>
    </div>

    <div class="btn-group">
        <a href="tel:+573000000000" class="btn btn-gold">LLAMAR AHORA</a>
        <a href="https://wa.me/573000000000" class="btn">WHATSAPP</a>
    </div>

    <div class="card-section">
        <h3 style="color: var(--gold); margin-bottom: 15px;">Conectemos</h3>
        <div class="grid-social">
            <div class="icon">in</div>
            <div class="icon">ig</div>
            <div class="icon">tw</div>
            <div class="icon">be</div>
        </div>
    </div>
</div>

<script>
    // Micro-interacción: Pulsos suaves en botones
    document.querySelectorAll('.btn').forEach(btn => {
        btn.addEventListener('touchstart', () => btn.style.borderColor = 'white');
        btn.addEventListener('touchend', () => btn.style.borderColor = 'rgba(212, 175, 55, 0.3)');
    });
</script>
</body>
</html>
