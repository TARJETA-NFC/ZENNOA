<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adriana Páez | Ingeniera Industrial</title>
    <style>
        :root { --dorado: #D4AF37; --negro: #0A0A0A; }
        body { background: var(--negro); color: white; font-family: 'Helvetica Neue', sans-serif; margin: 0; display: flex; justify-content: center; }
        
        .card-container { width: 100%; max-width: 400px; padding: 20px; text-align: center; }
        
        .perfil-img { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--dorado); margin-bottom: 10px; object-fit: cover; }
        
        h1 { color: var(--dorado); margin: 5px 0; font-size: 1.5rem; }
        
        /* Video/Media */
        .video-box { width: 100%; height: 200px; background: #1a1a1a; border-radius: 10px; margin: 20px 0; display: flex; align-items: center; justify-content: center; border: 1px solid #333; }
        
        /* Botones */
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; background: transparent; border: 1px solid var(--dorado); color: white; text-decoration: none; border-radius: 8px; transition: 0.3s; font-weight: bold; }
        .btn:hover { background: var(--dorado); color: var(--negro); }
        
        .grid-social { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>

<div class="card-container">
    <img src="foto-adriana.jpg" alt="Adriana Páez" class="perfil-img">
    <h1>Adriana Páez</h1>
    <p>Ingeniera Industrial</p>

    <div class="video-box">
        <!-- Aquí puedes incrustar un iframe de YouTube o un video propio -->
        <span>Video/Portafolio de Proyectos</span>
    </div>

    <a href="tel:+573000000000" class="btn" onclick="playClick()">📞 LLAMAR AHORA</a>
    <a href="https://wa.me/573000000000" class="btn" onclick="playClick()">💬 WHATSAPP</a>

    <div class="grid-social">
        <a href="#" class="btn">LinkedIn</a>
        <a href="#" class="btn">Instagram</a>
    </div>
</div>

<audio id="audio" src="click.mp3"></audio>

<script>
    function playClick() { document.getElementById('audio').play(); }
</script>
</body>
</html>
