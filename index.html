<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjeta NFC Digital</title>
    <style>
        :root {
            --dorado: #D4AF37;
            --negro: #0A0A0A;
        }

        body {
            margin: 0;
            background-color: var(--negro);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow: hidden;
        }

        /* Contenedor con borde animado */
        .card {
            position: relative;
            width: 300px;
            padding: 2px; /* Espesor del borde */
            background: linear-gradient(45deg, var(--dorado), #000, var(--dorado));
            border-radius: 15px;
            text-align: center;
            animation: borderRotate 3s linear infinite;
        }

        .card-inner {
            background: var(--negro);
            padding: 40px 20px;
            border-radius: 14px;
        }

        @keyframes borderRotate {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        h1 { color: var(--dorado); margin-bottom: 5px; }
        p { opacity: 0.8; margin-bottom: 20px; }

        button {
            background: transparent;
            color: var(--dorado);
            border: 1px solid var(--dorado);
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-weight: bold;
        }

        button:hover {
            background: var(--dorado);
            color: var(--negro);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="card-inner">
            <h1>Tu Nombre</h1>
            <p>Cargo / Profesión</p>
            <button id="btn-contacto">Guardar Contacto</button>
        </div>
    </div>

    <!-- Sonido -->
    <audio id="sonido-click" src="click.mp3"></audio>

    <script>
        const btn = document.getElementById('btn-contacto');
        const audio = document.getElementById('sonido-click');

        btn.addEventListener('click', () => {
            // Reproducir sonido
            audio.play().catch(e => console.log("Interacción necesaria para audio"));
            
            // Acción de descarga (ejemplo)
            alert("Descargando archivo VCF...");
            // window.location.href = 'contacto.vcf'; 
        });
    </script>
</body>
</html>
